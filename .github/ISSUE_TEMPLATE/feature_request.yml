name: Feature Request
description: 提出一个新功能建议
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细描述你想要的功能，帮助我理解你的需求。

  - type: dropdown
    id: module
    attributes:
      label: 功能所属模块
      description: 请选择功能所属的模块
      options:
        - AI 智能 (Agent / 知识库 / RCA / AI 修复)
        - 告警中心 (告警 / 降噪 / 关联 / Webhook)
        - 审计日志
        - 认证与授权 (登录 / 用户)
        - 自动化运维 (修复策略 / 自动伸缩)
        - 备份恢复
        - 变更管理 (变更 / 审批)
        - 配置管理 (模板 / Compose / 配置修复)
        - 容器与虚拟机 (Docker / VMware / Proxmox / KVM)
        - 数据库连接管理
        - 数据中心基础设施 (机房 / 机柜 / 设备)
        - 导入导出
        - Kubernetes 集群管理
        - 联动统计 / 巡检中心
        - MCP 工具协议
        - 监控仪表盘 (仪表盘 / 报告 / 成本分析 / Prometheus / Zabbix)
        - 网络管理 (设备 / 拓扑 / SNMP / 发现)
        - 通知系统 (渠道 / 发送)
        - 服务器管理 (服务器 / SSH 密钥 / 分组 / 终端)
        - 系统设置
        - 工具箱
        - 脚本 / 终端 / AI 命令
        - 工作流编排
        - 其他（全新模块）
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能想解决什么问题？
      placeholder: 请描述你遇到的问题或需求...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何实现这个功能？
      placeholder: 请描述你期望的解决方案...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 描述其他可能的实现方式...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于理解需求的信息
      placeholder: 补充信息...
    validations:
      required: false
